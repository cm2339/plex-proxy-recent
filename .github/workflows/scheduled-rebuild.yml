name: Weekly Base Image Rebuild

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday at 3am UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rebuild and push latest with fresh base image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true          # always pull the latest base image
          no-cache: true      # force full rebuild, no layer cache
          tags: |
            cm2339/plex-proxy-recent:latest
          cache-to: type=gha,mode=max
